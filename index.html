<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>En mantenimiento</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-family: Arial, sans-serif;
            background-color: #f2f2f2;
        }

        h1 {
            font-size: 60px;
            margin: 0;
        }

        #reloj {
            margin-top: 20px;
            font-size: 30px;
            font-weight: bold;
        }

        p {
            margin-top: 20px;
            font-size: 18px;
            color: #555;
        }
    </style>
</head>
<body>

    <h1>En Mantenimiento</h1>
    <div id="reloj"></div>
    <p>A las 20:00 del dia 24 de marzo estara solucionado</p>

    <script>
        const reloj = document.getElementById("reloj");

        // Fecha objetivo: 24 de marzo a las 20:00 en España
        const fechaObjetivo = new Date("2026-03-24T20:00:00+01:00");

        let intervalo = setInterval(() => {
            const ahora = new Date();

            // Hora en España
            const opciones = {
                timeZone: "Europe/Madrid",
                hour: "2-digit",
                minute: "2-digit",
                second: "2-digit"
            };

            const horaEspaña = ahora.toLocaleTimeString("es-ES", opciones);
            reloj.textContent = horaEspaña;

            // Si llega a la hora objetivo, parar el reloj
            if (ahora >= fechaObjetivo) {
                clearInterval(intervalo);
            }

        }, 1000);
    </script>

</body>
</html>
